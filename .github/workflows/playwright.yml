name: Run Playwright Tests

on: 
    workflow_dispatch:

jobs:
    test:
        name: Run playwright tests
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Install npm dependencies
              run: npm ci
            - name: Install Playwright
              run: npx playwright install --with-deps
            - name: Run tests
              run: npx playwright test
